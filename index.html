<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Dodge</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            border: 2px solid #444;
            background: #000;
            cursor: none;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
        }
        .game-over {
            position: absolute;
            text-align: center;
            display: none;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background: #00ffcc;
            border: none;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div>Score: <span id="score">0</span></div>
        <div>Difficulty: <span id="difficulty">1</span></div>
    </div>

    <div class="game-over" id="gameOverScreen">
        <h1>GAME OVER</h1>
        <p>Final Score: <span id="finalScore">0</span></p>
        <button onclick="resetGame()">Try Again</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const diffElement = document.getElementById('difficulty');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const finalScoreElement = document.getElementById('finalScore');

    // Set canvas size
    canvas.width = 600;
    canvas.height = 400;

    let score = 0;
    let gameActive = true;
    let enemies = [];
    let frameCount = 0;
    let difficultyMultiplier = 1;

    const player = {
        x: 300,
        y: 200,
        size: 15,
        color: '#00ffcc'
    };

    // Track mouse movement
    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        player.x = e.clientX - rect.left;
        player.y = e.clientY - rect.top;
    });

    class Enemy {
        constructor() {
            this.size = Math.random() * 20 + 10;
            // Spawn from edges
            if (Math.random() > 0.5) {
                this.x = Math.random() > 0.5 ? -this.size : canvas.width + this.size;
                this.y = Math.random() * canvas.height;
            } else {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() > 0.5 ? -this.size : canvas.height + this.size;
            }
            
            // Calculate speed based on difficulty
            const angle = Math.atan2(player.y - this.y, player.x - this.x);
            const speed = (Math.random() * 2 + 1) * difficultyMultiplier;
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed;
            this.color = `hsl(${Math.random() * 360}, 70%, 60%)`;
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;
        }

        draw() {
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, this.size, this.size);
        }
    }

    function spawnEnemy() {
        // Spawn rate increases as difficulty increases
        const spawnInterval = Math.max(5, 30 - Math.floor(difficultyMultiplier * 2));
        if (frameCount % spawnInterval === 0) {
            enemies.push(new Enemy());
        }
    }

    function checkCollision(enemy) {
        return (
            player.x < enemy.x + enemy.size &&
            player.x + player.size > enemy.x &&
            player.y < enemy.y + enemy.size &&
            player.y + player.size > enemy.y
        );
    }

    function resetGame() {
        score = 0;
        difficultyMultiplier = 1;
        enemies = [];
        gameActive = true;
        frameCount = 0;
        gameOverScreen.style.display = 'none';
        loop();
    }

    function loop() {
        if (!gameActive) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Update Difficulty and Score
        frameCount++;
        score++;
        difficultyMultiplier = 1 + (score / 1000); // Increases every frame
        
        scoreElement.innerText = score;
        diffElement.innerText = difficultyMultiplier.toFixed(2);

        // Player
        ctx.fillStyle = player.color;
        ctx.shadowBlur = 10;
        ctx.shadowColor = player.color;
        ctx.fillRect(player.x - player.size/2, player.y - player.size/2, player.size, player.size);
        ctx.shadowBlur = 0;

        // Enemies
        spawnEnemy();
        for (let i = enemies.length - 1; i >= 0; i--) {
            const e = enemies[i];
            e.update();
            e.draw();

            if (checkCollision(e)) {
                gameActive = false;
                finalScoreElement.innerText = score;
                gameOverScreen.style.display = 'block';
            }

            // Remove off-screen enemies
            if (e.x < -100 || e.x > canvas.width + 100 || e.y < -100 || e.y > canvas.height + 100) {
                enemies.splice(i, 1);
            }
        }

        requestAnimationFrame(loop);
    }

    loop();
</script>
</body>
</html>
