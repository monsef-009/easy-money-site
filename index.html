<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neon Infiltrator: Level Up</title>
    <style>
        body { margin: 0; background: #000; color: #0ff; font-family: 'Courier New', monospace; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        canvas { border: 4px solid #0ff; box-shadow: 0 0 20px #0ff; background: #050505; margin-top: 20px; }
        #ui { margin-top: 10px; text-align: center; text-transform: uppercase; letter-spacing: 2px; }
        .stat { display: inline-block; margin: 0 20px; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="stat">Level: <span id="lvl">1</span></div>
        <div class="stat">Attempts: <span id="deaths">0</span></div>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 800;
    canvas.height = 500;

    let currentLevel = 1;
    let deaths = 0;
    let keys = {};
    
    let player = { x: 50, y: 400, w: 20, h: 20, vx: 0, vy: 0, jumping: false, color: '#0ff' };
    let goal = { x: 750, y: 430, w: 30, h: 40 };
    let platforms = [];
    let enemies = [];

    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    function initLevel(lvl) {
        player.x = 50;
        player.y = 400;
        player.vx = 0;
        player.vy = 0;
        
        // Define floor
        platforms = [{ x: 0, y: 470, w: 800, h: 30 }];
        
        // Procedural Platform Generation based on Level
        for (let i = 0; i < Math.min(lvl + 2, 8); i++) {
            platforms.push({
                x: 150 + (i * 80),
                y: 400 - (i * 40),
                w: 100,
                h: 15
            });
        }

        // Enemy Generation: More enemies and faster speed per level
        enemies = [];
        const enemyCount = Math.floor(lvl / 2) + 1;
        for (let i = 0; i < enemyCount; i++) {
            enemies.push({
                x: 200 + (Math.random() * 400),
                y: 0, // Assigned in loop
                w: 15,
                h: 15,
                vx: (2 + (lvl * 0.5)) * (Math.random() > 0.5 ? 1 : -1),
                range: 150,
                startX: 0
            });
        }
        
        // Place enemies on platforms
        enemies.forEach((en, index) => {
            let plat = platforms[index % platforms.length];
            en.y = plat.y - en.h;
            en.startX = plat.x;
            en.range = plat.w;
        });

        // Place Goal on the furthest/highest platform
        let lastPlat = platforms[platforms.length - 1];
        goal.x = lastPlat.x + (lastPlat.w / 2) - 15;
        goal.y = lastPlat.y - 40;

        document.getElementById('lvl').innerText = lvl;
    }

    function update() {
        // Physics
        if (keys['ArrowLeft'] || keys['KeyA']) player.vx = -5;
        else if (keys['ArrowRight'] || keys['KeyD']) player.vx = 5;
        else player.vx *= 0.8;

        if ((keys['ArrowUp'] || keys['Space'] || keys['KeyW']) && !player.jumping) {
            player.vy = -12;
            player.jumping = true;
        }

        player.vy += 0.6; // Gravity
        player.x += player.vx;
        player.y += player.vy;

        // Platform Collision
        player.jumping = true;
        platforms.forEach(p => {
            if (player.x < p.x + p.w && player.x + player.w > p.x &&
                player.y + player.h > p.y && player.y + player.h < p.y + p.h + player.vy) {
                player.y = p.y - player.h;
                player.vy = 0;
                player.jumping = false;
            }
        });

        // Enemy Movement & Collision
        enemies.forEach(en => {
            en.x += en.vx;
            if (en.x < en.startX || en.x > en.startX + en.range - en.w) en.vx *= -1;

            if (player.x < en.x + en.w && player.x + player.w > en.x &&
                player.y < en.y + en.h && player.y + player.h > en.y) {
                deaths++;
                document.getElementById('deaths').innerText = deaths;
                initLevel(currentLevel);
            }
        });

        // Goal Collision
        if (player.x < goal.x + goal.w && player.x + player.w > goal.x &&
            player.y < goal.y + goal.h && player.y + player.h > goal.y) {
            currentLevel++;
            initLevel(currentLevel);
        }

        // Screen Bounds
        if (player.y > canvas.height) initLevel(currentLevel);
        if (player.x < 0) player.x = 0;
        if (player.x > canvas.width - player.w) player.x = canvas.width - player.w;
    }

    function draw() {
        ctx.fillStyle = '#050505';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Draw Goal
        ctx.fillStyle = '#0f0';
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#0f0';
        ctx.fillRect(goal.x, goal.y, goal.w, goal.h);

        // Draw Platforms
        ctx.fillStyle = '#333';
        ctx.shadowBlur = 0;
        platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));

        // Draw Player
        ctx.fillStyle = player.color;
        ctx.shadowBlur = 10;
        ctx.shadowColor = player.color;
        ctx.fillRect(player.x, player.y, player.w, player.h);

        // Draw Enemies
        ctx.fillStyle = '#f0f';
        ctx.shadowColor = '#f0f';
        enemies.forEach(en => ctx.fillRect(en.x, en.y, en.w, en.h));

        update();
        requestAnimationFrame(draw);
    }

    initLevel(currentLevel);
    draw();
</script>
</body>
</html>
