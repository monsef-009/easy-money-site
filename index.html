<!DOCTYPE html>
<html>
<head>
  <title>Catch Master</title>
  <style>
    body {
      text-align: center;
      background: #111;
      color: white;
      font-family: Arial;
    }
    canvas {
      background: #222;
      display: none;
      margin: auto;
    }
    button {
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>🎮 Catch Master</h1>

<div id="menu">
  <button onclick="startGame()">Start Game</button>
</div>

<p>Score: <span id="score">0</span></p>
<p>Lives: <span id="lives">3</span></p>
<p>High Score: <span id="high">0</span></p>

<canvas id="game" width="400" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player, blocks, score, lives, speed, gameRunning;
let highScore = localStorage.getItem("high") || 0;
document.getElementById("high").innerText = highScore;

function startGame() {
  document.getElementById("menu").style.display = "none";
  canvas.style.display = "block";

  player = { x: 180, y: 460, width: 40, height: 20, speed: 7 };
  blocks = [];
  score = 0;
  lives = 3;
  speed = 2;
  gameRunning = true;

  updateUI();
  gameLoop();
  setInterval(createBlock, 800);
}

function createBlock() {
  if (!gameRunning) return;

  let type = Math.random();
  blocks.push({
    x: Math.random() * 360,
    y: 0,
    size: 20,
    speed: speed,
    type: type < 0.8 ? "normal" : "gold"
  });
}

function updateUI() {
  document.getElementById("score").innerText = score;
  document.getElementById("lives").innerText = lives;
}

function drawPlayer() {
  ctx.fillStyle = "lime";
  ctx.fillRect(player.x, player.y, player.width, player.height);
}

function drawBlocks() {
  blocks.forEach(block => {
    ctx.fillStyle = block.type === "gold" ? "yellow" : "red";
    ctx.fillRect(block.x, block.y, block.size, block.size);
  });
}

function updateBlocks() {
  blocks.forEach((block, index) => {
    block.y += block.speed;

    // catch
    if (
      block.x < player.x + player.width &&
      block.x + block.size > player.x &&
      block.y < player.y + player.height &&
      block.y + block.size > player.y
    ) {
      score += block.type === "gold" ? 5 : 1;
      blocks.splice(index, 1);
      updateUI();
    }

    // missed
    if (block.y > canvas.height) {
      lives--;
      blocks.splice(index, 1);
      updateUI();

      if (lives <= 0) {
        endGame();
      }
    }
  });
}

function gameLoop() {
  if (!gameRunning) return;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawPlayer();
  drawBlocks();
  updateBlocks();

  // increase difficulty
  speed += 0.001;

  requestAnimationFrame(gameLoop);
}

function endGame() {
  gameRunning = false;

  if (score > highScore) {
    localStorage.setItem("high", score);
  }

  alert("Game Over! Score: " + score);
  location.reload();
}

// controls
document.addEventListener("keydown", e => {
  if (e.key === "ArrowLeft" && player.x > 0) {
    player.x -= player.speed;
  }
  if (e.key === "ArrowRight" && player.x < canvas.width - player.width) {
    player.x += player.speed;
  }
});
</script>

</body>
</html>
