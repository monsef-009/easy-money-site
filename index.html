<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VOID-RUNNER: CORE ENGINE</title>
    <style>
        :root { --neon: #00f2ff; --bg: #050508; --danger: #ff0055; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #game-container { display: grid; grid-template-columns: 1fr 300px; height: 100vh; }
        canvas { width: 100%; height: 100%; background: #000; image-rendering: pixelated; }
        #sidebar { background: #0a0a12; border-left: 2px solid #1a1a2e; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .stat-bar { background: #222; height: 20px; border-radius: 10px; overflow: hidden; border: 1px solid #444; }
        .fill { height: 100%; transition: width 0.3s ease; }
        #hp-fill { background: var(--danger); }
        #xp-fill { background: var(--neon); }
        .log { flex-grow: 1; background: #000; border: 1px solid #1a1a2e; padding: 10px; font-size: 12px; overflow-y: auto; color: #aaa; font-family: monospace; }
        .upgrade-btn { background: #1a1a2e; border: 1px solid var(--neon); color: var(--neon); padding: 8px; cursor: pointer; transition: 0.2s; }
        .upgrade-btn:hover { background: var(--neon); color: #000; }
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); border: 2px solid var(--neon); padding: 40px; text-align: center; display: none; z-index: 100; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="stage"></canvas>
    <div id="sidebar">
        <h2>VOID-RUNNER</h2>
        <div>
            <label>INTEGRITY (HP)</label>
            <div class="stat-bar"><div id="hp-fill" class="fill" style="width: 100%"></div></div>
        </div>
        <div>
            <label>DATA CORE (XP)</label>
            <div class="stat-bar"><div id="xp-fill" class="fill" style="width: 0%"></div></div>
        </div>
        <div id="stats-text">
            Level: 1<br>
            Nanites: 0<br>
            Sector Depth: 1
        </div>
        <div class="log" id="game-log">Initializing System...<br>Welcome, Operative.</div>
        <button class="upgrade-btn" onclick="upgrade('atk')">Upgrade Attack (50 N)</button>
        <button class="upgrade-btn" onclick="upgrade('def')">Upgrade Defense (50 N)</button>
    </div>
</div>

<div id="modal" class="modal">
    <h1 id="modal-title">SECTOR CLEAR</h1>
    <p id="modal-text"></p>
    <button class="upgrade-btn" onclick="closeModal()">CONTINUE ASCENSION</button>
</div>

<script>
/**
 * VOID-RUNNER ENGINE v1.0.4
 * A complex procedural dungeon crawler with tactical state management.
 */

const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
const log = document.getElementById('game-log');

// Game State
const GS = {
    tileSize: 40,
    gridW: 0,
    gridH: 0,
    player: { x: 2, y: 2, hp: 100, maxHp: 100, atk: 10, def: 5, xp: 0, lvl: 1, nanites: 0 },
    enemies: [],
    map: [],
    fog: [],
    depth: 1,
    turn: 'player'
};

function init() {
    resize();
    generateSector();
    window.addEventListener('keydown', handleInput);
    render();
}

function resize() {
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    GS.gridW = Math.floor(canvas.width / GS.tileSize);
    GS.gridH = Math.floor(canvas.height / GS.tileSize);
}

function generateSector() {
    GS.map = [];
    GS.fog = [];
    GS.enemies = [];
    
    // Fill map with walls
    for (let y = 0; y < GS.gridH; y++) {
        GS.map[y] = [];
        GS.fog[y] = [];
        for (let x = 0; x < GS.gridW; x++) {
            GS.map[y][x] = (Math.random() < 0.18) ? 1 : 0; // 1 = Wall
            GS.fog[y][x] = 1; // 1 = Hidden
        }
    }

    // Ensure player start is clear
    GS.map[GS.player.y][GS.player.x] = 0;
    
    // Exit Portal
    GS.map[GS.gridH - 3][GS.gridW - 3] = 2; // 2 = Portal

    // Spawn Enemies
    const count = 5 + GS.depth;
    for(let i=0; i<count; i++) {
        let ex = Math.floor(Math.random() * GS.gridW);
        let ey = Math.floor(Math.random() * GS.gridH);
        if(GS.map[ey][ex] === 0 && (ex > 5 || ey > 5)) {
            GS.enemies.push({
                x: ex, y: ey, 
                hp: 20 + (GS.depth * 10), 
                atk: 5 + (GS.depth * 2),
                type: Math.random() > 0.8 ? 'ELITE' : 'DRONE'
            });
        }
    }
    updateFog();
}

function updateFog() {
    for(let y = GS.player.y-3; y <= GS.player.y+3; y++) {
        for(let x = GS.player.x-3; x <= GS.player.x+3; x++) {
            if(GS.map[y] && GS.map[y][x] !== undefined) GS.fog[y][x] = 0;
        }
    }
}

function handleInput(e) {
    if(GS.turn !== 'player') return;

    let dx = 0, dy = 0;
    if(e.key === 'ArrowUp' || e.key === 'w') dy = -1;
    if(e.key === 'ArrowDown' || e.key === 's') dy = 1;
    if(e.key === 'ArrowLeft' || e.key === 'a') dx = -1;
    if(e.key === 'ArrowRight' || e.key === 'd') dx = 1;

    if(dx !== 0 || dy !== 0) {
        attemptMove(dx, dy);
    }
}

function attemptMove(dx, dy) {
    const nx = GS.player.x + dx;
    const ny = GS.player.y + dy;

    // Boundary check
    if(nx < 0 || nx >= GS.gridW || ny < 0 || ny >= GS.gridH) return;

    // Wall check
    if(GS.map[ny][nx] === 1) return;

    // Portal check
    if(GS.map[ny][nx] === 2) {
        nextSector();
        return;
    }

    // Enemy check (Combat)
    const enemy = GS.enemies.find(e => e.x === nx && e.y === ny);
    if(enemy) {
        combat(enemy);
    } else {
        GS.player.x = nx;
        GS.player.y = ny;
        updateFog();
    }

    GS.turn = 'enemy';
    setTimeout(enemyTurn, 100);
}

function combat(enemy) {
    const dmg = Math.max(1, GS.player.atk - Math.floor(Math.random() * 5));
    enemy.hp -= dmg;
    addLog(`You strike ${enemy.type} for ${dmg} damage.`, '#00f2ff');
    
    if(enemy.hp <= 0) {
        const index = GS.enemies.indexOf(enemy);
        GS.enemies.splice(index, 1);
        GS.player.xp += 25;
        GS.player.nanites += 15;
        addLog(`Enemy Neutralized. +25 Data, +15 Nanites.`, '#0f0');
        checkLevelUp();
    }
}

function enemyTurn() {
    GS.enemies.forEach(e => {
        const dist = Math.hypot(e.x - GS.player.x, e.y - GS.player.y);
        if(dist < 5) {
            // Move toward player
            let dx = e.x < GS.player.x ? 1 : (e.x > GS.player.x ? -1 : 0);
            let dy = e.y < GS.player.y ? 1 : (e.y > GS.player.y ? -1 : 0);
            
            if(e.x + dx === GS.player.x && e.y + dy === GS.player.y) {
                // Attack
                const dmg = Math.max(1, e.atk - (GS.player.def / 2));
                GS.player.hp -= Math.floor(dmg);
                addLog(`Warning: ${e.type} hit you for ${Math.floor(dmg)} damage!`, '#f05');
            } else if (GS.map[e.y + dy][e.x + dx] === 0) {
                e.x += dx;
                e.y += dy;
            }
        }
    });

    if(GS.player.hp <= 0) {
        alert("SYSTEM PERMANENTLY OFFLINE. REBOOTING...");
        location.reload();
    }

    GS.turn = 'player';
    updateUI();
    render();
}

function addLog(msg, color) {
    const entry = document.createElement('div');
    entry.style.color = color || '#aaa';
    entry.innerHTML = `> ${msg}`;
    log.prepend(entry);
}

function updateUI() {
    document.getElementById('hp-fill').style.width = `${(GS.player.hp / GS.player.maxHp) * 100}%`;
    document.getElementById('xp-fill').style.width = `${(GS.player.xp % 100)}%`;
    document.getElementById('stats-text').innerHTML = `
        Level: ${GS.player.lvl}<br>
        Nanites: ${GS.player.nanites}<br>
        Sector Depth: ${GS.depth}
    `;
}

function checkLevelUp() {
    if(GS.player.xp >= GS.player.lvl * 100) {
        GS.player.lvl++;
        GS.player.maxHp += 20;
        GS.player.hp = GS.player.maxHp;
        addLog(`DATA SYNC COMPLETE: Reached Level ${GS.player.lvl}. Integrity Restored.`, '#ff0');
    }
}

function upgrade(type) {
    if(GS.player.nanites >= 50) {
        GS.player.nanites -= 50;
        if(type === 'atk') GS.player.atk += 5;
        if(type === 'def') GS.player.def += 2;
        addLog(`System Upgrade installed.`, '#0ff');
        updateUI();
    } else {
        addLog(`Insufficient Nanites.`, '#f00');
    }
}

function nextSector() {
    GS.depth++;
    document.getElementById('modal-title').innerText = `SECTOR ${GS.depth-1} PURIFIED`;
    document.getElementById('modal-text').innerText = `Advancing to Sub-Level ${GS.depth}... Enemies are evolving.`;
    document.getElementById('modal').style.display = 'block';
}

function closeModal() {
    document.getElementById('modal').style.display = 'none';
    generateSector();
    render();
}

function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for(let y=0; y<GS.gridH; y++) {
        for(let x=0; x<GS.gridW; x++) {
            const tile = GS.map[y][x];
            const isFog = GS.fog[y][x];

            if(isFog) {
                ctx.fillStyle = '#020205';
            } else {
                if(tile === 1) ctx.fillStyle = '#1a1a2e';
                else if(tile === 2) ctx.fillStyle = '#0f0'; // Portal
                else ctx.fillStyle = '#08080f';
            }
            
            ctx.fillRect(x * GS.tileSize, y * GS.tileSize, GS.tileSize-1, GS.tileSize-1);
        }
    }

    // Render Enemies
    GS.enemies.forEach(e => {
        if(GS.fog[e.y][e.x] === 0) {
            ctx.fillStyle = e.type === 'ELITE' ? '#ff00ff' : '#ff4400';
            ctx.beginPath();
            ctx.moveTo(e.x * GS.tileSize + 20, e.y * GS.tileSize + 5);
            ctx.lineTo(e.x * GS.tileSize + 35, e.y * GS.tileSize + 35);
            ctx.lineTo(e.x * GS.tileSize + 5, e.y * GS.tileSize + 35);
            ctx.fill();
        }
    });

    // Render Player
    ctx.fillStyle = '#00f2ff';
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#00f2ff';
    ctx.fillRect(GS.player.x * GS.tileSize + 5, GS.player.y * GS.tileSize + 5, GS.tileSize - 10, GS.tileSize - 10);
    ctx.shadowBlur = 0;
}

init();
</script>
</body>
</html>
